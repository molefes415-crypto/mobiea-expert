<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MOBI EA MANAGEMENT</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rubik+Glitch&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080808;
      color: #f0f0f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    .rubik-glitch { font-family: 'Rubik Glitch', cursive !important; }
    .font-orbitron { font-family: 'Orbitron', sans-serif !important; }

    /* Refined Animations */
    @keyframes scaleIn { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.04); opacity: 1; } }
    @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
    @keyframes splashFade { 0% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes splashLogoIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes splashTextIn { 0% { opacity: 0; transform: translateY(8px); letter-spacing: 10px; } 100% { opacity: 1; transform: translateY(0); letter-spacing: 8px; } }
    @keyframes splashBarFill { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes ringPulse { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px var(--glow-color, rgba(196,30,58,0.2)); } 50% { box-shadow: 0 0 25px var(--glow-color, rgba(196,30,58,0.35)); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out both; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1); }
    .animate-slide-in-up { animation: slideInUp 0.35s cubic-bezier(0.16,1,0.3,1); }

    /* Visual Effects */
    @keyframes rainFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity:1; } 100% { transform: translateY(110vh) rotate(360deg); opacity:0; } }
    @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity:1; } 100% { transform: translateY(-10vh) scale(1.2); opacity:0; } }
    @keyframes lightning { 0%,100% { opacity:0; } 10% { opacity:1; } 20% { opacity:0; } 30% { opacity:0.8; } 40% { opacity:0; } }
    .effect-overlay { position:fixed; inset:0; z-index:300; pointer-events:none; overflow:hidden; }
    .effect-particle { position:absolute; animation-fill-mode:forwards; }
    @keyframes scanLine { 0% { top: 0%; } 100% { top: 100%; } }
    @keyframes scanPulse { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
    @keyframes symbolFloat { 0% { transform: translateY(-30px) rotate(0deg) scale(1); opacity:0; } 10% { opacity:0.6; } 50% { opacity:0.4; } 90% { opacity:0.15; } 100% { transform: translateY(115vh) rotate(90deg) scale(0.8); opacity:0; } }
    .symbol-rain-particle { position:absolute; font-weight:700; animation: symbolFloat linear forwards; pointer-events:none; }
    @keyframes lightningBolt { 0% { opacity:0; } 5% { opacity:1; } 10% { opacity:0.2; } 15% { opacity:0.9; } 25% { opacity:0; } 100% { opacity:0; } }
    @keyframes candleFall { 0% { transform: translateY(-60px) rotate(0deg); opacity:1; } 100% { transform: translateY(115vh) rotate(45deg); opacity:0; } }

    /* Glass */
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(12,12,12,0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }

    /* Draggable Icon */
    .draggable-icon { position: fixed; z-index: 200; cursor: grab; touch-action: none; }
    .draggable-icon:active { cursor: grabbing; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,8,8,0.82);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(32px);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: center; align-items: center;
      padding: 4px 0 env(safe-area-inset-bottom, 10px); z-index: 50;
    }
    .nav-btn {
      flex: 1; max-width: 110px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 12px; background: transparent; border: none;
      color: rgba(255,255,255,0.28); font-family: 'Inter'; font-size: 9px; font-weight: 600;
      letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease;
    }
    .nav-btn.active { color: #fff; }
    .nav-btn svg { transition: all 0.3s ease; }
    .nav-fire-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; transition: all 0.3s ease;
    }
    .nav-fire-btn:active { transform: scale(0.94); }

    /* Splash Screen */
    .splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      animation: splashFade 3.5s ease-in-out forwards;
    }
    .splash-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      animation: ringPulse 2.5s ease-out infinite;
    }
    .splash-logo { animation: splashLogoIn 1s cubic-bezier(0.16,1,0.3,1) 0.2s both; z-index: 2; }
    .splash-title { animation: splashTextIn 0.8s ease-out 0.5s both; z-index: 2; }
    .splash-subtitle { animation: fadeInUp 0.6s ease-out 0.9s both; z-index: 2; }
    .splash-bar-container {
      width: 160px; height: 2px; background: rgba(255,255,255,0.05);
      border-radius: 4px; overflow: hidden; margin-top: 40px;
      animation: fadeIn 0.5s ease-out 1.2s both; z-index: 2;
    }
    .splash-bar {
      height: 100%; border-radius: 4px;
      animation: splashBarFill 2s ease-in-out 1.2s both;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ====== SVG Icons (clean, consistent stroke width) ======
    const HomeIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
    const PlusIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
    const PlayIcon = ({size=20,color="#fff"}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><polygon points="6 3 20 12 6 21"/></svg>);
    const SquareIcon = ({size=20,color="white"}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>);
    const SparklesIcon = ({color="white"}) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);
    const TrashIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>);
    const XIcon = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
    const ArrowLeftIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
    const ArrowRightIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
    const SettingsIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>);
    const CheckIcon = ({size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>);
    const CrownIcon = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4l3 12h14l3-12-5 4-5-4-5 4-5-4z"/><rect x="5" y="18" width="14" height="3" rx="1"/></svg>);
    const ClockIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
    const CameraIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);
    const ChartIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
    const LockIcon = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
    const MicIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>);

    // ====== Toast System ======
    const ToastContext = React.createContext(null);
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const addToast = (t) => {
        const id = Date.now();
        setToasts(prev => [...prev, { ...t, id }]);
        setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 3000);
      };
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div style={{ position:'fixed', top:16, left:'50%', transform:'translateX(-50%)', zIndex:999, display:'flex', flexDirection:'column', gap:8, width:'calc(100% - 32px)', maxWidth:380, pointerEvents:'none' }}>
            {toasts.map(t => (
              <div key={t.id} className="animate-slide-in-up" style={{
                background: t.variant === 'destructive' ? 'rgba(220,38,38,0.95)' : 'rgba(22,22,22,0.95)',
                backdropFilter:'blur(20px)',
                color:'white', padding:'14px 18px', borderRadius:14, maxWidth:'100%',
                boxShadow:'0 8px 40px rgba(0,0,0,0.4)',
                border: t.variant === 'destructive' ? '1px solid rgba(255,255,255,0.1)' : '1px solid rgba(255,255,255,0.08)',
                pointerEvents:'auto'
              }}>
                <div style={{fontWeight:600, fontSize:13, marginBottom:2}}>{t.title}</div>
                <div style={{opacity:0.7, fontSize:12, fontWeight:400}}>{t.description}</div>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };
    const useToast = () => React.useContext(ToastContext);

    // ====== Draggable Bot Icon ======
    const DraggableBotIcon = ({ image, onClose, onClick, tc }) => {
      const posRef = useRef({ x: 20, y: window.innerHeight - 160 });
      const [pos, setPos] = useState(posRef.current);
      const draggingRef = useRef(false);
      const startRef = useRef({ x:0, y:0 });
      const offsetRef = useRef({ x:0, y:0 });
      const movedRef = useRef(false);
      const activeRef = useRef(false);
      const a = tc?.accent || '#C41E3A';

      const handleStart = (cx, cy) => { activeRef.current = true; draggingRef.current = true; movedRef.current = false; startRef.current = {x:cx,y:cy}; offsetRef.current = posRef.current; };
      const handleMove = (cx, cy) => { if (!draggingRef.current) return; const dx=cx-startRef.current.x; const dy=cy-startRef.current.y; if(Math.abs(dx)>5||Math.abs(dy)>5) movedRef.current=true; const np={x:Math.max(0,Math.min(window.innerWidth-70,offsetRef.current.x+dx)),y:Math.max(0,Math.min(window.innerHeight-70,offsetRef.current.y+dy))}; posRef.current=np; setPos(np); };
      const handleEnd = () => { draggingRef.current=false; activeRef.current=false; };

      useEffect(() => {
        const mm=e=>handleMove(e.clientX,e.clientY); const mu=()=>handleEnd();
        const tm=e=>{e.preventDefault();handleMove(e.touches[0].clientX,e.touches[0].clientY);}; const te=()=>handleEnd();
        window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
        window.addEventListener('touchmove',tm,{passive:false}); window.addEventListener('touchend',te);
        return()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);window.removeEventListener('touchmove',tm);window.removeEventListener('touchend',te);};
      }, []);

      return (
        <div className="draggable-icon animate-scale-in" style={{left:pos.x,top:pos.y}}
          onMouseDown={e=>handleStart(e.clientX,e.clientY)} onTouchStart={e=>handleStart(e.touches[0].clientX,e.touches[0].clientY)}
          onClick={()=>{ if(!movedRef.current) onClick?.(); }}>
          <div style={{width:64,height:64,borderRadius:'50%',overflow:'hidden',animation:'float 3s ease-in-out infinite',background:`linear-gradient(135deg,${a},${tc?.dark||'#8B0000'})`,border:`2px solid ${a}`,boxShadow:`0 0 16px ${tc?.glow||'rgba(196,30,58,0.6)'}, 0 0 32px ${a}88, inset 0 0 12px rgba(0,0,0,0.3)`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            {image ? <img src={image} alt="Bot" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <div style={{fontSize:28,color:'white'}}>🤖</div>}
          </div>
        </div>
      );
    };

    // ====== Signal Trade Panel ======
    const SignalTradePanel = ({ signal, onExecute, onDismiss, tc, botName, botImage }) => {
      const a = tc?.accent || '#C41E3A';
      const d = tc?.dark || '#8B0000';
      const g = tc?.glow || 'rgba(196,30,58,0.5)';
      const isBuy = signal.direction === 'BUY';
      return (
        <div style={{position:'fixed',inset:0,zIndex:160,display:'flex',alignItems:'flex-end',justifyContent:'center',background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)'}} className="animate-fade-in">
          <div style={{width:'100%',maxWidth:480,background:'#0c0c0c',borderRadius:'20px 20px 0 0',border:`1px solid ${a}40`,boxShadow:`0 -10px 60px ${g}, 0 -4px 20px rgba(0,0,0,0.8)`,overflow:'hidden',paddingBottom:'env(safe-area-inset-bottom,16px)'}} className="animate-slide-in-up">
            {/* Signal header */}
            <div style={{padding:'12px 20px',background:`linear-gradient(135deg,${a}25,${d}18)`,borderBottom:`1px solid ${a}22`,display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',overflow:'hidden',background:`linear-gradient(135deg,${a},${d})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {botImage ? <img src={botImage} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <span style={{fontSize:16}}>🤖</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'#22c55e',boxShadow:'0 0 8px rgba(34,197,94,0.8)',animation:'breathe 1s ease-in-out infinite'}}/>
                  <span style={{fontFamily:'Orbitron',fontSize:9,color:'#22c55e',letterSpacing:2,fontWeight:700}}>LIVE SIGNAL</span>
                </div>
                <p style={{color:'white',fontSize:12,fontWeight:600,marginTop:1}}>{botName || 'Trading Robot'}</p>
              </div>
              <button onClick={onDismiss} style={{width:28,height:28,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.4)'}}><XIcon size={12}/></button>
            </div>

            <div style={{padding:'20px 20px 10px'}}>
              {/* Direction badge */}
              <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
                <span style={{padding:'10px 40px',borderRadius:12,fontFamily:'Orbitron',fontWeight:800,fontSize:22,letterSpacing:4,color:'white',background:isBuy?'linear-gradient(135deg,#22c55e,#16a34a)':'linear-gradient(135deg,#ef4444,#dc2626)',boxShadow:isBuy?'0 4px 20px rgba(34,197,94,0.4)':'0 4px 20px rgba(239,68,68,0.4)'}}>
                  {isBuy ? '▲ BUY' : '▼ SELL'}
                </span>
              </div>

              {/* Symbol */}
              <p style={{textAlign:'center',fontSize:20,fontWeight:800,color:'white',fontFamily:'Orbitron',letterSpacing:3,marginBottom:16}}>{signal.symbol}</p>

              {/* Details grid */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:18}}>
                {[
                  {l:'LOT',v:signal.lotSize,c:'#eab308'},
                  {l:'TP',v:signal.tp||'Market',c:'#22c55e'},
                  {l:'SL',v:signal.sl||'None',c:'#ef4444'},
                  {l:'PLATFORM',v:signal.platform,c:'white'},
                ].map(i=>(
                  <div key={i.l} style={{background:'rgba(255,255,255,0.04)',borderRadius:10,padding:'10px 6px',textAlign:'center',border:'1px solid rgba(255,255,255,0.06)'}}>
                    <p style={{fontSize:8,color:'rgba(255,255,255,0.3)',letterSpacing:1,marginBottom:4,fontWeight:600}}>{i.l}</p>
                    <p style={{fontSize:13,fontWeight:800,color:i.c,fontFamily:'Orbitron'}}>{i.v}</p>
                  </div>
                ))}
              </div>

              {/* Buttons */}
              <div style={{display:'flex',gap:10,marginBottom:8}}>

      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
        if (displayed.length < text.length) {
          const timer = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), 50);
          return () => clearTimeout(timer);
        } else { onComplete?.(); }
      }, [displayed, text]);
      return (
        <div style={{lineHeight:1.2}}>
          <span className="rubik-glitch" style={{fontSize:'1.3rem',letterSpacing:'0.04em',color:'#141414'}}>
            {displayed}{displayed.length < text.length && <span className="animate-pulse">|</span>}
          </span>
        </div>
      );
    };

    const CircularCountdown = ({ onComplete, tradeData }) => {
      const TOTAL = 1200;
      const [seconds, setSeconds] = useState(TOTAL);
      useEffect(() => { if (seconds > 0) { const t = setTimeout(() => setSeconds(c => c - 1), 1000); return () => clearTimeout(t); } else { onComplete?.(); } }, [seconds]);
      const radius = 88, stroke = 3, circumference = 2 * Math.PI * radius;
      const progress = seconds / TOTAL, dashOffset = circumference * (1 - progress);
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const angle = progress * 2 * Math.PI - Math.PI / 2;
      const dotX = 100 + radius * Math.cos(angle), dotY = 100 + radius * Math.sin(angle);
      const td = tradeData || {};
      const sym = td.symbol || 'XAUUSDm';
      const dir = td.direction || 'buy';
      const entry = td.entry || '5090.67';
      const lot = td.lotSize || '0.01';
      const orderNum = '#' + (309304330 + Math.floor(Math.random()*1000));
      const logLines = [`Setting Up Trade on MT5`, `>>"${orderNum} ${dir} ${lot} ${sym} at ${entry} successful"`, `>>"${orderNum} ${dir} ${lot} ${sym} at ${entry} successful"`];

        <div style={{position:'fixed',inset:0,zIndex:100,display:'flex',flexDirection:'column',background:'#C41E3A'}}>

                <circle cx="100" cy="100" r={radius} fill="none" stroke="white" strokeWidth={stroke} strokeDasharray={circumference} strokeDashoffset={dashOffset} strokeLinecap="round" style={{transition:'all 1s linear'}}/>
                <circle cx={dotX} cy={dotY} r="6" fill="#22c55e" style={{transition:'all 1s linear'}}/>
              </svg>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',zIndex:10}}>
                <span style={{color:'rgba(255,255,255,0.5)',fontSize:11,fontFamily:'Orbitron',letterSpacing:3,fontWeight:600}}>MINUTES</span>
                <span className="rubik-glitch" style={{color:'white',fontSize:44,lineHeight:1}}>{minutes}:{secs.toString().padStart(2,'0')}</span>

            </div>

          setViewingSymbol(symbol);

        if (viewingSymbol) {
          const updated = { ...allowedSymbols };

                <div key={p.id} style={{position:'absolute',left:p.left+'%',top:'-60px',display:'flex',flexDirection:'column',alignItems:'center',animation:`candleFall ${p.duration}s linear ${p.delay}s infinite`,opacity:p.opacity}}>
                  <div style={{width:1,height:wickH,background:isGreen?'#22c55e':'#ef4444'}}/>
                  <div style={{width:p.size*0.6,height:bodyH,background:isGreen?'#22c55e':'#ef4444',borderRadius:2,boxShadow:`0 0 8px ${isGreen?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.5)'}`}}/>
                  <div style={{width:1,height:wickH,background:isGreen?'#22c55e':'#ef4444'}}/>
                </div>
              );
            })}
          </div>
        );
      }
      const emojiMap = {dollars:'💵',money:'💰',confetti:'🎊',fireworks:'🎆',snow:'❄️',hearts:'❤️',fire:'🔥',stars:'⭐',rockets:'🚀',lightning:'⚡',rain:'💧',diamond:'💎',party:'🥳',trophy:'🏆',bitcoin:'₿'};
      const emoji = emojiMap[effect] || '✨';
      const animName = ['fire','rockets','hearts','stars'].includes(effect) ? 'floatUp' : effect==='lightning' ? 'lightning' : 'rainFall';
      return (
        <div className="effect-overlay">
          {effect === 'lightning' && <div style={{position:'absolute',inset:0,background:'white',animation:'lightning 0.5s ease-in-out 3'}}/>}
          {particles.map(p => (<div key={p.id} className="effect-particle" style={{left:p.left+'%',top:animName==='floatUp'?'auto':'-5%',bottom:animName==='floatUp'?'-5%':'auto',fontSize:p.size+'px',animationName:animName,animationDuration:p.duration+'s',animationDelay:p.delay+'s',animationTimingFunction:'linear'}}>{emoji}</div>))}
        </div>
      );
    };

    // ====== Color Picker Panel ======
    const FONT_OPTIONS = [
      { name: 'Rubik Glitch', label: 'Rubik Glitch', family: "'Rubik Glitch', cursive" },
      { name: 'Orbitron', label: 'Orbitron', family: "'Orbitron', sans-serif" },
      { name: 'Inter', label: 'Inter', family: "'Inter', sans-serif" },
      { name: 'Monospace', label: 'Monospace', family: "'Courier New', monospace" },
      { name: 'Serif', label: 'Serif', family: "Georgia, serif" },
    ];

    const ColorPickerPanel = ({ isOpen, onClose, onColorChange, currentColor, currentFont, onFontChange, onEffect }) => {
      if (!isOpen) return null;
      const colors = Object.entries(colorMap).map(([name,v])=>({name,label:name.charAt(0).toUpperCase()+name.slice(1),...v}));
      const ac = currentColor ? (colorMap[currentColor]?.accent || '#C41E3A') : '#C41E3A';
      return (
        <div style={{position:'fixed',inset:0,zIndex:250,display:'flex'}} className="animate-fade-in">
          <div onClick={onClose} style={{flex:1,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)'}}/>
          <div style={{width:'72%',maxWidth:300,background:'#0c0c0c',height:'100%',overflowY:'auto',padding:'28px 20px',display:'flex',flexDirection:'column',gap:24,borderLeft:'1px solid rgba(255,255,255,0.05)'}} className="animate-slide-in-right">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <h2 style={{color:'white',fontSize:15,fontWeight:700,letterSpacing:1}}>Theme</h2>
              <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.4)'}}><XIcon size={14}/></button>
            </div>

            <div>
              <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,letterSpacing:3,fontWeight:600,marginBottom:12,textTransform:'uppercase'}}>Accent Color</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
                {colors.map(c => (
                  <button key={c.name} onClick={()=>onColorChange({accent:c.accent,dark:c.dark,glow:c.glow},c.name)} style={{
                    width:'100%',aspectRatio:'1',borderRadius:12,background:`linear-gradient(135deg,${c.accent},${c.dark})`,
                    border:currentColor===c.name?'2px solid white':'2px solid transparent',
                    cursor:'pointer',transition:'all 0.3s',
                    boxShadow:currentColor===c.name?`0 0 16px ${c.glow}`:'none'
                  }}/>
                ))}
              </div>
            </div>

            <div>
              <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,letterSpacing:3,fontWeight:600,marginBottom:12,textTransform:'uppercase'}}>Font</p>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {FONT_OPTIONS.map(f => (
                  <button key={f.name} onClick={()=>onFontChange?.(f.name)} style={{
                    display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderRadius:10,
                    background:currentFont===f.name?`${ac}12`:'transparent',
                    border:currentFont===f.name?`1px solid ${ac}30`:'1px solid rgba(255,255,255,0.04)',
                    cursor:'pointer',transition:'all 0.3s'
                  }}>
                    <span style={{fontFamily:f.family,fontSize:13,color:currentFont===f.name?ac:'rgba(255,255,255,0.5)',fontWeight:currentFont===f.name?600:400,flex:1,textAlign:'left'}}>{f.label}</span>
                    {currentFont===f.name && <CheckIcon size={14}/>}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,letterSpacing:3,fontWeight:600,marginBottom:12,textTransform:'uppercase'}}>Effects</p>
              <button onClick={()=>{onEffect?.('symbolrain');onClose();}} style={{
                width:'100%',padding:'14px 16px',borderRadius:12,cursor:'pointer',border:'1px solid rgba(255,255,255,0.06)',
                background:'rgba(255,255,255,0.02)',display:'flex',alignItems:'center',gap:12,transition:'all 0.3s'
              }}>
                <span style={{fontSize:22}}>🌧️</span>
                <div style={{flex:1,textAlign:'left'}}>
                  <p style={{fontSize:13,fontWeight:600,color:'white'}}>Symbol Rain</p>
                  <p style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:2}}>Fullscreen particle effect</p>
                </div>
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ====== MetaTrader View ======
    const MetaTraderView = ({ isVIP, themeColor }) => {
      const [activeTab, setActiveTab] = useState('mt5');
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);
      const toast = useToast();
      const [form, setForm] = useState(()=>{try{const s=localStorage.getItem('mt_credentials_mt5');return s?JSON.parse(s):{login:'',password:'',server:''};}catch{return{login:'',password:'',server:''};}});
      const [connected, setConnected] = useState(()=>{try{return localStorage.getItem('mt_connected_mt5')==='true';}catch{return false;}});
      const [accountId, setAccountId] = useState(()=>{try{return localStorage.getItem('mt_accountId_mt5')||'';}catch{return '';}});
      const [accountInfo, setAccountInfo] = useState(null);
      const [loadingInfo, setLoadingInfo] = useState(false);

      const switchTab = (t) => { localStorage.setItem(`mt_credentials_${activeTab}`,JSON.stringify(form)); localStorage.setItem(`mt_connected_${activeTab}`,connected.toString()); localStorage.setItem(`mt_accountId_${activeTab}`,accountId); setActiveTab(t); try{const s=localStorage.getItem(`mt_credentials_${t}`);setForm(s?JSON.parse(s):{login:'',password:'',server:''});setConnected(localStorage.getItem(`mt_connected_${t}`)==='true');setAccountId(localStorage.getItem(`mt_accountId_${t}`)||'');setAccountInfo(null);}catch{setForm({login:'',password:'',server:''});setConnected(false);setAccountId('');setAccountInfo(null);} };

      // === MTAPI.io direct integration ===
      // Base URL depends on platform (mt5.mtapi.io / mt4.mtapi.io).
      const mtBase = (platform) => `https://${(platform||'mt5').toLowerCase()}.mtapi.io`;
      const mtFetch = async (platform, path, qs) => {
        const url = new URL(`${mtBase(platform)}${path}`);
        Object.entries(qs||{}).forEach(([k,v])=>{ if(v!==undefined&&v!==null&&v!=='') url.searchParams.set(k,String(v)); });
        const resp = await fetch(url.toString(), { method:'GET' });
        const txt = await resp.text();
        if (!resp.ok) throw new Error(txt || `MTAPI ${resp.status}`);
        try { return JSON.parse(txt); } catch { return txt; }
      };
      const callMetaAPI = async (action, params) => {
        const plat = (params.platform || activeTab || 'mt5').toLowerCase();
        if (action === 'listAccounts') return []; // mtapi has no per-key listing; we just provision/reuse
        if (action === 'provision') {
          const token = await mtFetch(plat, '/ConnectEx', { user: params.login, password: params.password, server: params.server });
          const id = typeof token === 'string' ? token.replace(/"/g,'').trim() : (token.id || token);
          if (!id || /error/i.test(String(id))) throw new Error(`MTAPI Connect failed: ${id}`);
          return { id, _id: id, platform: plat };
        }
        if (action === 'deploy') return { ok: true };
        if (action === 'getAccountInfo') {
          const platForId = localStorage.getItem(`mt_platform_for_${params.accountId}`) || plat;
          const info = await mtFetch(platForId, '/AccountSummary', { id: params.accountId });
          return info;
        }
        if (action === 'trade') {
          const platForId = params.platform || localStorage.getItem(`mt_platform_for_${params.accountId}`) || plat;
          const op = params.actionType === 'ORDER_TYPE_BUY' ? 'Buy' : 'Sell';
          const result = await mtFetch(platForId, '/OrderSend', {
            id: params.accountId, symbol: params.symbol, operation: op,
            volume: params.volume, stoploss: params.stopLoss, takeprofit: params.takeProfit,
            placedType: 'Manual', comment: 'MOBI EA',
          });
          return { ticket: result };
        }
        throw new Error(`Unknown action: ${action}`);
      };

      const friendlyError = (msg) => {
        if (!msg) return 'Unknown error occurred.';
        if (msg.includes('authenticate') || msg.includes('Invalid account') || msg.includes('Account disabled'))
          return 'Invalid credentials. Please check your login ID, password, server name, and make sure you selected the correct platform (MT4/MT5).';
        if (msg.includes('already exists') || msg.includes('already been created'))
          return 'This account has already been provisioned. Attempting to reconnect...';
        if (msg.includes('not found'))
          return 'Account not found. Please verify your server name matches your broker exactly.';
        if (msg.includes('METAAPI_TOKEN'))
          return 'Backend configuration error. Please contact support.';
        return msg;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.login || !form.password || !form.server) return;
        setLoading(true);
        try {
          let aid = '';

          // Step 1: Check if account already exists
          try {
            const accounts = await callMetaAPI('listAccounts', {});
            const existing = Array.isArray(accounts) && accounts.find(a =>
              String(a.login) === String(form.login) && a.server === form.server
            );
            if (existing) {
              aid = existing.id || existing._id;
              toast({ title: 'Account Found', description: 'Reconnecting existing account...' });
            }
          } catch (e) { /* ignore list error, try provision */ }

          // Step 2: Provision if not found
          if (!aid) {
            const provResult = await callMetaAPI('provision', {
              login: form.login, password: form.password, server: form.server, platform: activeTab
            });
            aid = provResult.id || provResult._id;
            if (!aid) throw new Error('No account ID returned from provisioning.');
          }

          // Step 3: Deploy (connect) the account
          try {
            await callMetaAPI('deploy', { accountId: aid });
          } catch (deployErr) {
            // If already deployed, that's fine
            if (!deployErr.message?.includes('already') && !deployErr.message?.includes('DEPLOYED'))
              throw deployErr;
          }

          // Step 4: Wait for cloud connection
          toast({ title: 'Connecting...', description: 'Deploying on cloud servers, please wait...' });
          await new Promise(r => setTimeout(r, 6000));

          setAccountId(aid);
          setConnected(true);
          localStorage.setItem(`mt_credentials_${activeTab}`, JSON.stringify(form));
          localStorage.setItem(`mt_connected_${activeTab}`, 'true');
          localStorage.setItem(`mt_accountId_${activeTab}`, aid);
          localStorage.setItem(`mt_platform_for_${aid}`, activeTab);
          toast({ title: 'Account Linked!', description: `${activeTab.toUpperCase()} account connected via MetaAPI Cloud.` });

          // Try to fetch account info
          try {
            const info = await callMetaAPI('getAccountInfo', { accountId: aid });
            setAccountInfo(info);
          } catch (e) {
            // Account may still be deploying, retry after delay
            setTimeout(async () => {
              try {
                const info = await callMetaAPI('getAccountInfo', { accountId: aid });
                setAccountInfo(info);
              } catch (e2) { /* still deploying */ }
            }, 8000);
          }
        } catch (err) {
          const friendly = friendlyError(err.message);
          toast({ title: 'Connection Failed', description: friendly, variant: 'destructive' });
        }
        setLoading(false);
      };

      const fetchAccountInfo = async () => {
        if (!accountId) return;
        setLoadingInfo(true);
        try {
          const info = await callMetaAPI('getAccountInfo', { accountId });
          setAccountInfo(info);
        } catch (err) {
          toast({ title: 'Error', description: err.message, variant: 'destructive' });
        }
        setLoadingInfo(false);
      };

      const handleDisconnect = () => {
        setConnected(false); setAccountId(''); setAccountInfo(null);
        localStorage.removeItem(`mt_connected_${activeTab}`);
        localStorage.removeItem(`mt_accountId_${activeTab}`);
        toast({ title: 'Disconnected', description: 'Account unlinked.' });
      };

      const tc = themeColor || (isVIP ? colorMap.blue : colorMap.red);
      const a = tc.accent;
      const d = tc.dark;
      const g = tc.glow;

      return (
        <div style={{minHeight:'calc(100vh - 80px)',display:'flex',flexDirection:'column',alignItems:'center',paddingBottom:40,position:'relative',zIndex:5}} className="animate-fade-in">
          {/* Tabs */}
          <div style={{display:'flex',gap:0,width:'100%',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
            {['mt5','mt4'].map(t => (
              <button key={t} onClick={()=>switchTab(t)} style={{
                flex:1,padding:'16px 0',fontFamily:'Orbitron',fontWeight:700,fontSize:11,letterSpacing:3,border:'none',cursor:'pointer',
                background:'transparent',color:activeTab===t?'white':'rgba(255,255,255,0.25)',
                borderBottom:activeTab===t?`2px solid ${a}`:'2px solid transparent',transition:'all 0.3s'
              }}>{t.toUpperCase()} ACCOUNT</button>
            ))}
          </div>

          {/* Card */}
          <div style={{margin:'28px 20px 0',width:'calc(100% - 40px)',maxWidth:400,borderRadius:20,padding:1,background:`linear-gradient(135deg,${a}60,${d}40,${a}30)`,boxShadow:`0 0 40px ${g.replace('0.5','0.15')}`}}>
            <div style={{background:'rgba(8,8,8,0.85)',backdropFilter:'blur(20px)',borderRadius:19,padding:'28px 24px'}}>
              {/* Status */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:connected?'#22c55e':'#ef4444',boxShadow:connected?'0 0 10px rgba(34,197,94,0.5)':'none',animation:connected?'breathe 2s ease-in-out infinite':'none'}}/>
                  <span style={{fontFamily:'Orbitron',fontSize:10,color:connected?'#22c55e':'rgba(255,255,255,0.35)',letterSpacing:2,fontWeight:600}}>{connected?'CONNECTED VIA METAAPI':'NOT CONNECTED'}</span>
                </div>
                {connected && <button onClick={handleDisconnect} style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'4px 10px',cursor:'pointer',color:'#ef4444',fontSize:9,fontFamily:'Orbitron',fontWeight:600,letterSpacing:1}}>UNLINK</button>}
              </div>

              {/* Logo */}
              <div style={{textAlign:'center',marginBottom:12}}>
                <div style={{width:56,height:56,margin:'0 auto',borderRadius:14,background:`${a}12`,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${a}25`}}>
                  <span style={{fontSize:24,fontWeight:900,color:a,fontFamily:'Orbitron'}}>{activeTab==='mt5'?'5':'4'}</span>
                </div>
              </div>

              <h1 style={{textAlign:'center',color:'white',fontSize:16,fontWeight:700,letterSpacing:2,marginBottom:28,fontFamily:'Orbitron'}}>{activeTab.toUpperCase()} LOGIN</h1>

              {/* Account Info if connected */}
              {connected && accountInfo && (
                <div style={{marginBottom:20,borderRadius:12,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',padding:16}} className="animate-scale-in">
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    {[
                      {l:'Balance',v:'$'+(accountInfo.balance||0).toFixed(2),c:'white'},
                      {l:'Equity',v:'$'+(accountInfo.equity||0).toFixed(2),c:'#22c55e'},
                      {l:'Margin',v:'$'+(accountInfo.margin||0).toFixed(2),c:'#eab308'},
                      {l:'Free Margin',v:'$'+(accountInfo.freeMargin||0).toFixed(2),c:a},
                    ].map(i=>(
                      <div key={i.l} style={{textAlign:'center',padding:'10px 0'}}>
                        <p style={{fontSize:9,color:'rgba(255,255,255,0.3)',letterSpacing:1,marginBottom:4,fontWeight:600}}>{i.l}</p>
                        <p style={{fontSize:14,fontWeight:800,color:i.c,fontFamily:'Orbitron'}}>{i.v}</p>
                      </div>
                    ))}
                  </div>
                  <button onClick={fetchAccountInfo} disabled={loadingInfo} style={{width:'100%',marginTop:10,padding:'10px 0',borderRadius:10,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.5)',fontSize:10,cursor:'pointer',fontFamily:'Orbitron',letterSpacing:1,fontWeight:600}}>
                    {loadingInfo ? 'Refreshing...' : '↻ Refresh'}
                  </button>
                </div>
              )}

              {connected && !accountInfo && (
                <button onClick={fetchAccountInfo} disabled={loadingInfo} style={{width:'100%',marginBottom:20,padding:'14px 0',borderRadius:12,background:`${a}10`,border:`1px solid ${a}25`,color:a,fontSize:11,cursor:'pointer',fontFamily:'Orbitron',letterSpacing:2,fontWeight:700}}>
                  {loadingInfo ? 'Loading...' : 'Fetch Account Info'}
                </button>
              )}

              <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:20}}>
                {[{label:'Login',type:'text',key:'login',ph:'Enter login ID'},{label:'Password',type:showPw?'text':'password',key:'password',ph:'Enter password',pw:true},{label:'Server',type:'text',key:'server',ph:'e.g. AccuMarkets-Live'}].map(f=>(
                  <div key={f.key} style={{position:'relative'}}>
                    <label style={{position:'absolute',top:-9,left:14,background:'#111',padding:'0 8px',fontSize:10,color:'rgba(255,255,255,0.3)',fontFamily:'Orbitron',letterSpacing:1,fontWeight:600,zIndex:2}}>{f.label}</label>
                    <div style={{position:'relative'}}>
                      <input type={f.type} value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.ph}
                        style={{width:'100%',padding:f.pw?'16px 44px 16px 16px':'16px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)',color:'white',fontSize:14,outline:'none',transition:'border-color 0.3s',letterSpacing:0.5,boxSizing:'border-box'}}
                        onFocus={e=>e.target.style.borderColor=a} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.08)'}/>
                      {f.pw && <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'transparent',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.25)',fontSize:16}}>{showPw?'🙈':'👁'}</button>}
                    </div>
                  </div>
                ))}
                <button type="submit" disabled={loading||!form.login||!form.password||!form.server} style={{
                  width:'100%',padding:16,borderRadius:14,marginTop:4,
                  background:loading?'rgba(255,255,255,0.04)':`linear-gradient(135deg,${a},${d})`,
                  color:'white',border:'none',fontSize:13,letterSpacing:2,cursor:'pointer',fontFamily:'Orbitron',fontWeight:700,
                  opacity:(!form.login||!form.password||!form.server)?0.35:1,transition:'all 0.3s',
                  boxShadow:(!form.login||!form.password||!form.server)?'none':`0 4px 24px ${g.replace('0.5','0.25')}`
                }}>{loading ? 'Connecting via MetaAPI...' : connected ? 'Re-Link '+activeTab.toUpperCase() : 'Link '+activeTab.toUpperCase()}</button>
              </form>
            </div>
          </div>

          <div style={{marginTop:20,display:'flex',alignItems:'center',gap:6}}>
            <LockIcon/>
            <span style={{fontSize:10,color:'rgba(255,255,255,0.2)',fontWeight:500,letterSpacing:1}}>Secured via MetaAPI Cloud</span>
          </div>
        </div>
      );
    };

    // ====== Settings View ======
    const SettingsView = ({ themeColor, onColorChange, themeName, currentFont, onFontChange, onEffect, onOpenSettings, onOpenChartAnalyzer, botSettings, interfaceMode, onInterfaceModeChange, isListening, voiceTranscript, onToggleVoice }) => {
      const tc = themeColor || colorMap.red;
      const a = tc.accent;
      const sections = [
        { title:'Bot Settings', desc:'Name, avatar & interface', icon:'⚙️', action:onOpenSettings },
        { title:'AI Analyzer', desc:'Chart analysis powered by AI', icon:'🧠', action:onOpenChartAnalyzer },
      ];
      return (
        <div style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:20,minHeight:'calc(100vh - 80px)',position:'relative',zIndex:5}} className="animate-fade-in">
          <div style={{textAlign:'center',paddingTop:20}}>
            <div style={{width:52,height:52,borderRadius:14,background:`${a}10`,display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:14,color:a,border:`1px solid ${a}20`}}><SettingsIcon/></div>
            <h1 style={{fontSize:18,fontWeight:700,letterSpacing:2,color:'white'}}>Settings</h1>
          </div>

          {sections.map(s=>(
            <button key={s.title} onClick={s.action} style={{width:'100%',padding:'18px',borderRadius:14,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',cursor:'pointer',display:'flex',alignItems:'center',gap:14,color:'white',transition:'all 0.3s'}}>
              <span style={{fontSize:22}}>{s.icon}</span>
              <div style={{textAlign:'left',flex:1}}>
                <p style={{fontSize:14,fontWeight:600}}>{s.title}</p>
                <p style={{fontSize:11,opacity:0.35,marginTop:2}}>{s.desc}</p>
              </div>
              <ArrowRightIcon/>
            </button>
          ))}

          {/* Voice Theme */}
          <button onClick={onToggleVoice} style={{width:'100%',borderRadius:14,padding:'16px 18px',border:'1px solid rgba(255,255,255,0.06)',cursor:'pointer',display:'flex',alignItems:'center',gap:12,color:'white',background:isListening?'rgba(34,197,94,0.12)':'rgba(255,255,255,0.02)',transition:'all 0.3s'}}>
            <div style={{width:40,height:40,borderRadius:10,background:isListening?'rgba(34,197,94,0.15)':`${a}10`,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${isListening?'rgba(34,197,94,0.3)':`${a}20`}`}}>
              <MicIcon color={isListening?'#22c55e':a}/>
            </div>

e:'#FDF5E6',olive:'#808000',olivedrab:'#6B8E23',orange:'#FFA500',orangered:'#FF4500',orchid:'#DA70D6',palegoldenrod:'#EEE8AA',palegreen:'#98FB98',paleturquoise:'#AFEEEE',palevioletred:'#DB7093',papayawhip:'#FFEFD5',peachpuff:'#FFDAB9',peru:'#CD853F',pink:'#FF69B4',plum:'#DDA0DD',powderblue:'#B0E0E6',purple:'#800080',rebeccapurple:'#663399',red:'#FF0000',rosybrown:'#BC8F8F',royalblue:'#4169E1',saddlebrown:'#8B4513',salmon:'#FA8072',sandybrown:'#F4A460',seagreen:'#2E8B57',seashell:'#FFF5EE',sienna:'#A0522D',silver:'#C0C0C0',skyblue:'#87CEEB',slateblue:'#6A5ACD',slategray:'#708090',snow:'#FFFAFA',springgreen:'#00FF7F',steelblue:'#4682B4',tan:'#D2B48C',teal:'#008080',thistle:'#D8BFD8',tomato:'#FF6347',turquoise:'#40E0D0',violet:'#EE82EE',wheat:'#F5DEB3',white:'#FFFFFF',whitesmoke:'#F5F5F5',yellow:'#FFFF00',yellowgreen:'#9ACD32'};
        
        const hexToHslColor = (hex) => {
          let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
          const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
          let h=0, s=0;
          if(max!==min){const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
          const accent = hex;
          // Darken for dark variant
          const darkR=Math.max(0,parseInt(hex.slice(1,3),16)-40), darkG=Math.max(0,parseInt(hex.slice(3,5),16)-40), darkB=Math.max(0,parseInt(hex.slice(5,7),16)-40);
          const dark = `#${darkR.toString(16).padStart(2,'0')}${darkG.toString(16).padStart(2,'0')}${darkB.toString(16).padStart(2,'0')}`;
          return { accent, dark, glow:`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},0.9)` };
        };

        const r=new SR(); r.continuous=false; r.interimResults=true; r.lang='en-US';
        let finalText='';
        r.onresult=(event)=>{
          let t='';
          for(let i=0;i<event.results.length;i++) t+=event.results[i][0].transcript;
          finalText=t.trim();
          setVoiceTranscript(finalText);
        };
        r.onend=()=>{
          setIsListening(false);
          if(!finalText){setVoiceTranscript('');return;}
          const lower=finalText.toLowerCase().trim();
          let matched=false;

          // 1. Navigation commands
          if(lower.includes('take me to') || lower.includes('go to') || lower.includes('open') || lower.includes('navigate')){
            if(lower.includes('setting')){setActiveTab('settings');toast({title:'🧭 Navigated',description:'Opened Settings'});matched=true;}
            else if(lower.includes('home')){setActiveTab('home');toast({title:'🧭 Navigated',description:'Opened Home'});matched=true;}
            else if(lower.includes('meta') || lower.includes('trader') || lower.includes('trading')){setActiveTab('metatrader');toast({title:'🧭 Navigated',description:'Opened MetaTrader'});matched=true;}
            if(matched){setTimeout(()=>setVoiceTranscript(''),2000);return;}
          }

          // 2. Effect commands
          if(lower.includes('rain') && (lower.includes('candle') || lower.includes('stick'))){
            setActiveEffect('candlestickrain');
            toast({title:'🕯️ Candlestick Rain!',description:'Tap to stop'});
            matched=true;
            setTimeout(()=>setVoiceTranscript(''),2000);
            return;
          }
          if(lower.includes('lightning') || lower.includes('thunder')){
            setActiveEffect('lightning');
            toast({title:'⚡ Lightning!',description:'Say stop to end'});
            matched=true;
            setTimeout(()=>setVoiceTranscript(''),2000);
            return;
          }
          if(lower.includes('stop')){
            setActiveEffect(null);
            toast({title:'🛑 Stopped',description:'Effect stopped'});
            matched=true;
            setTimeout(()=>setVoiceTranscript(''),2000);
            return;
          }
          if(lower.includes('symbol rain') || lower.includes('money rain')){
            setActiveEffect('symbolrain');
            toast({title:'💰 Symbol Rain!',description:'Tap to stop'});
            matched=true;
            setTimeout(()=>setVoiceTranscript(''),2000);
            return;
          }

          // 3. Color: first check preset colorMap
          for(const c of Object.keys(colorMap)){
            if(lower.includes(c)){
              handleColorChange(colorMap[c],c);
              toast({title:'🎨 Theme Updated',description:`Changed to ${c}`});
              matched=true;
              setTimeout(()=>setVoiceTranscript(''),2000);
              break;
            }
          }
          
          // 4. If no preset match, try ALL CSS color names
          if(!matched){
            const words = lower.replace(/[^a-z ]/g,'').split(/\s+/);
            for(const word of words){
              if(cssColors[word]){
                const tc = hexToHslColor(cssColors[word]);
                handleColorChange(tc, word);
                toast({title:'🎨 Theme Updated',description:`Changed to ${word}`});
                matched=true;
                setTimeout(()=>setVoiceTranscript(''),2000);
                break;
              }
            }
            // Try multi-word CSS colors (e.g. "dark blue" → "darkblue")
            if(!matched){
              const joined = lower.replace(/[^a-z]/g,'');
              for(const [name, hex] of Object.entries(cssColors)){
                if(joined.includes(name)){
                  const tc = hexToHslColor(hex);
                  handleColorChange(tc, name);
                  toast({title:'🎨 Theme Updated',description:`Changed to ${name}`});
                  matched=true;
                  setTimeout(()=>setVoiceTranscript(''),2000);
                  break;
                }
              }
            }
          }
          
          if(!matched){
            toast({title:'Command Not Recognized',description:`Heard: "${finalText}". Try a color, "take me to settings", or "rain candlesticks"`,variant:'destructive'});
            setTimeout(()=>setVoiceTranscript(''),3000);
          }
        };
        r.onerror=(e)=>{setIsListening(false);setVoiceTranscript('');if(e.error!=='aborted'&&e.error!=='no-speech')toast({title:'Voice Error',description:e.error,variant:'destructive'});};
        r.start(); recognitionRef.current=r; setIsListening(true);
        toast({title:'🎙️ Recording...',description:'Say a command, then wait'});
      };

      const [appFont, setAppFont] = useState(()=>{try{return localStorage.getItem('appFont')||'Rubik Glitch';}catch{return 'Rubik Glitch';}});
      const handleFontChange = (fontName) => { setAppFont(fontName); localStorage.setItem('appFont',fontName); const f=FONT_OPTIONS.find(fo=>fo.name===fontName); if(f)document.body.style.fontFamily=f.family; };
      useEffect(()=>{const f=FONT_OPTIONS.find(fo=>fo.name===appFont);if(f)document.body.style.fontFamily=f.family;}, []);

      // Swipe
      const touchStartRef = useRef(null);
      useEffect(()=>{
        const ts=e=>{touchStartRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY};};
        const te=e=>{if(!touchStartRef.current)return;const dx=e.changedTouches[0].clientX-touchStartRef.current.x;const dy=e.changedTouches[0].clientY-touchStartRef.current.y;if(dx<-80&&Math.abs(dy)<100)setShowColorPicker(true);touchStartRef.current=null;};

      const [themeColor, setThemeColor] = useState(()=>{try{const s=localStorage.getItem('appThemeColor');return s?JSON.parse(s):null;}catch{return null;}});

      const [activeEffect, setActiveEffect] = useState(null);
      const [botSettings, setBotSettings] = useState(()=>{try{const s=localStorage.getItem('botSettings');return s?JSON.parse(s):{name:"PROSPER TRADING ROBOT",image:null,video:null,iconImage:null};}catch{return{name:"PROSPER TRADING ROBOT",image:null,video:null,iconImage:null};}});
      const [interfaceMode, setInterfaceMode] = useState(()=>{try{return localStorage.getItem('interfaceMode')||'normal';}catch{return 'normal';}});

      useEffect(()=>{localStorage.setItem('interfaceMode',interfaceMode);},[interfaceMode]);
      useEffect(()=>{if(eas.length>0&&!selectedEA)setSelectedEA(eas[0]);},[eas,selectedEA]);

      const handleAddEA = (key, licenseData) => {

      const handleRemoveEA = (id) => { const r=eas.filter(e=>e.id!==id); setEas(r); setShowDraggableIcon(false); setTradingEA(null); if(selectedEA?.id===id) setSelectedEA(r.length>0?r[0]:null); };

      // ====== Allowed Symbols (per user config) ======
      const [allowedSymbols, setAllowedSymbols] = useState(() => {
        try { const s = localStorage.getItem('allowedSymbols'); return s ? JSON.parse(s) : {}; } catch { return {}; }
      });
      const handleAllowedChange = (updated) => {
        setAllowedSymbols(updated);
        localStorage.setItem('allowedSymbols', JSON.stringify(updated));
      };

      // ====== Signal Polling ======
      const seenSignalIdsRef = useRef(new Set(
        JSON.parse(localStorage.getItem('seenSignalIds') || '[]')
      ));
      const [pendingSignal, setPendingSignal] = useState(null); // signal waiting for user confirm or auto-execute

      const processSignals = useCallback(async (ea) => {
        if (!ea?.licenseKey) return;
        try {
          const resp = await fetch(`https://mobieaexpert.com/admin/api/validate_license.php?key=${encodeURIComponent(ea.licenseKey)}`);
          const data = await resp.json();
          if (!data.success) return;
          const signals = data.signals || {}; // { "EURUSD.M": [{id,direction,tp,sl,lot,...}] }
          for (const [symbol, sigList] of Object.entries(signals)) {
            if (!allowedSymbols[symbol]) continue; // only process symbols user activated
            const cfg = allowedSymbols[symbol];
            for (const sig of sigList) {
              const sigId = String(sig.id);
              if (seenSignalIdsRef.current.has(sigId)) continue;
              seenSignalIdsRef.current.add(sigId);
              const updated = Array.from(seenSignalIdsRef.current);
              localStorage.setItem('seenSignalIds', JSON.stringify(updated));
              // Show signal panel

                symbol,
                direction: sig.direction,

            if (interfaceMode==='specter_x') return <SpecterXProHomeView buttonStyle={buttonStyle} eas={eas} selectedEA={selectedEA} setSelectedEA={setSelectedEA} onAddEA={handleAddEA} onRemoveEA={handleRemoveEA} onStartTrading={handleStartTrading} showDraggableIcon={showDraggableIcon} botSettings={botSettings} onOpenSettings={()=>setIsSettingsModalOpen(true)} themeColor={themeColor} allowedSymbols={allowedSymbols} onAllowedChange={handleAllowedChange}/>;
            if (interfaceMode==='neuro_scalper') return <NeuroScalperHomeView buttonStyle={buttonStyle} eas={eas} selectedEA={selectedEA} setSelectedEA={setSelectedEA} onAddEA={handleAddEA} onRemoveEA={handleRemoveEA} onStartTrading={handleStartTrading} showDraggableIcon={showDraggableIcon} botSettings={botSettings} onOpenSettings={()=>setIsSettingsModalOpen(true)} themeColor={themeColor} allowedSymbols={allowedSymbols} onAllowedChange={handleAllowedChange}/>;
            return <HomeView eas={eas} selectedEA={selectedEA} setSelectedEA={setSelectedEA} onAddEA={handleAddEA} onRemoveEA={handleRemoveEA} onStartTrading={handleStartTrading} showDraggableIcon={showDraggableIcon||!!tradeDelayTimer} botSettings={botSettings} onOpenSettings={()=>setIsSettingsModalOpen(true)} onColorChange={handleColorChange} themeColor={themeColor} onNavigate={setActiveTab} onStopTrading={handleFullStop} onSwitchMode={m=>{setInterfaceMode(m);localStorage.setItem('interfaceMode',m);}} onEffect={setActiveEffect} onChangePic={img=>{const s={...botSettings,image:img};setBotSettings(s);localStorage.setItem('botSettings',JSON.stringify(s));}} tradeDelaySeconds={tradeDelaySeconds} onOpenChartAnalyzer={()=>setShowChartAnalyzer(true)} isListening={isListening} voiceTranscript={voiceTranscript} onToggleVoice={toggleVoiceListening} interfaceMode={interfaceMode} allowedSymbols={allowedSymbols} onAllowedChange={handleAllowedChange}/>;
          case 'metatrader': return <MetaTraderView isVIP={interfaceMode==='vip'} themeColor={themeColor}/>;
          case 'settings': return <SettingsView themeColor={themeColor} onColorChange={handleColorChange} themeName={themeName} currentFont={appFont} onFontChange={handleFontChange} onEffect={setActiveEffect} onOpenSettings={()=>setIsSettingsModalOpen(true)} onOpenChartAnalyzer={()=>setShowChartAnalyzer(true)} botSettings={botSettings} interfaceMode={interfaceMode} onInterfaceModeChange={m=>{setInterfaceMode(m);localStorage.setItem('interfaceMode',m);}} isListening={isListening} voiceTranscript={voiceTranscript} onToggleVoice={toggleVoiceListening}/>;
          default: return null;
        }
      };

      return (
        <div style={{minHeight:'100vh',background:'#080808'}}>
          <BackgroundSymbolRain themeColor={themeColor}/>
          {showSplash && <SplashScreen onComplete={()=>setShowSplash(false)}/>}
          {showDraggableIcon && <DraggableBotIcon image={botSettings.iconImage||botSettings.image} onClose={handleFullStop} onClick={handleIconClick} tc={themeColor}/>}
          {showExecution && <ExecutionFlow onComplete={handleExecutionComplete} tradeData={tradeData}/>}
          {pendingSignal && !showExecution && (
            <SignalTradePanel
              signal={pendingSignal}
              onExecute={handleSignalExecute}
              onDismiss={()=>setPendingSignal(null)}
              tc={themeColor}
              botName={botSettings.name}
              botImage={botSettings.iconImage||botSettings.image}
            />
          )}
          {showBotPopup && <BotStatusPopup botName={botSettings.name} botImage={botSettings.iconImage||botSettings.image} onClose={()=>setShowBotPopup(false)} onRemove={()=>{if(selectedEA)handleRemoveEA(selectedEA.id);}} onStop={handleFullStop} onQuotes={()=>setShowBotPopup(false)} tc={themeColor} logs={executionLogs} isOnline={showDraggableIcon}/>}
          <VisualEffectsOverlay effect={activeEffect} onDone={()=>setActiveEffect(null)} themeColor={themeColor}/>
          <ChartAnalyzer isOpen={showChartAnalyzer} onClose={()=>setShowChartAnalyzer(false)} onExecute={(r,sym)=>{setTradeData({symbol:sym,direction:r.direction,entry:r.entry,tp:r.tp,sl:r.sl,lotSize:r.lotSize});setShowChartAnalyzer(false);setShowExecution(true);setShowDraggableIcon(true);}}/>
          <ColorPickerPanel isOpen={showColorPicker} onClose={()=>setShowColorPicker(false)} onColorChange={handleColorChange} currentColor={themeName} currentFont={appFont} onFontChange={handleFontChange} onEffect={setActiveEffect}/>
          <BotSettingsModal isOpen={isSettingsModalOpen} onClose={()=>setIsSettingsModalOpen(false)} interfaceMode={interfaceMode} onInterfaceModeChange={m=>{setInterfaceMode(m);localStorage.setItem("interfaceMode",m);}} buttonStyle={buttonStyle} onButtonStyleChange={s=>{setButtonStyle(s);localStorage.setItem("buttonStyle",s);}}/>
          <div style={{maxWidth:480,margin:'0 auto',paddingBottom:80}}>{renderContent()}</div>
          {!showSplash && <BottomNav activeTab={activeTab} onTabChange={setActiveTab} tc={themeColor}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App/></ToastProvider>);
  </script>
</body>
</html>
